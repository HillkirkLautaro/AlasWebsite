<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Espacio Psicopedagógico Alas</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Chewy&family=Cormorant+Garamond:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">

    <!-- LOGO -->
    <div class="logo-section">

      <img
        src="img/logo.png"
        alt="Logo Espacio Psicopedagógico Alas"
        class="logo"
      >

      <h1 class="title">
        Espacio Psicopedagógico
      </h1>

    </div>

    <!-- AGENDA -->
    <div class="agenda-section">

      <p class="agenda-title">
        AGENDA ABIERTA
      </p>

    </div>

    <!-- DIRECCIÓN -->
    <div class="address-section">

      <div class="address-box">

        <!-- ICONO -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="location-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"
          ></path>

          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"
          ></path>
        </svg>

        <h2 class="address">
          BOLIVAR 557
        </h2>

      </div>

    </div>

    <!-- CONTACTOS -->
    <div class="contacts-section">

      <div class="contact-card">

        <p class="phone">
          3487-204907
        </p>

        <p class="name">
          Galazzo Karen
        </p>

      </div>

      <div class="contact-card">

        <p class="phone">
          3487-237297
        </p>

        <p class="name">
          Brutti Di Yorio Lucila
        </p>

      </div>

      <div class="contact-card">

        <p class="phone">
          3487-645410
        </p>

        <p class="name">
          Brutti Di Yorio Mariana
        </p>

      </div>

    </div>

  </main>

</body>

</html>
